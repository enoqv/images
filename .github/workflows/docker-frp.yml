name: Docker (frp)

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    tags:
      - "frp/*"

env:
  REGISTRY: ghcr.io

permissions:
  packages: write

jobs:
  build-publish:
    name: Build and publish Docker image

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Prepare
        run: |
          VERSION=${GITHUB_REF_NAME#*/}  # take part after the first slash
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # frps
      - name: Docker meta (frps)
        id: meta-frps
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/frps
          labels: |
            image.title=frps
            image.source=${{ github.server_url }}/${{ github.repository }}
            image.version=${{ env.VERSION }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
      # frps
      - name: Build and push (frps)
        uses: docker/bake-action@v6
        env:
          VERSION: ${{ env.VERSION }}
        with:
          source: .
          files: |
            ./frp/docker-bake.hcl
            ${{ steps.meta-frps.outputs.bake-file }}
          targets: frps
          push: true
      # frpc
      - name: Docker meta (frpc)
        id: meta-frpc
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/frpc
          labels: |
            image.title=frpc
            image.source=${{ github.server_url }}/${{ github.repository }}
            image.version=${{ env.VERSION }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
      # frpc
      - name: Build and push (frpc)
        uses: docker/bake-action@v6
        env:
          VERSION: ${{ env.VERSION }}
        with:
          source: .
          files: |
            ./frp/docker-bake.hcl
            ${{ steps.meta-frpc.outputs.bake-file }}
          targets: frpc
          push: true
