name: Docker (juicefs)

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    tags:
      - "juicefs/*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: juicefs

permissions:
  packages: write

jobs:
  build-publish:
    name: Build and publish Docker image

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Prepare
        run: |
          VERSION=${GITHUB_REF_NAME#*/}  # take part after the first slash
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          labels: |
            image.title=${{ env.IMAGE_NAME }}
            image.source=${{ github.server_url }}/${{ github.repository }}
            image.version=${{ env.VERSION }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
      - name: Build and push
        uses: docker/bake-action@v6
        env:
          VERSION: ${{ env.VERSION }}
        with:
          source: .
          files: |
            ./juicefs/docker-bake.hcl
            ${{ steps.meta.outputs.bake-file }}
          targets: juicefs
          push: true
